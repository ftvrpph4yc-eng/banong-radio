<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>伴农电台状态大屏</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #10120f;
        --surface: #181a16;
        --surface-strong: #20231e;
        --surface-soft: #262820;
        --text: #f5efe2;
        --muted: #a8aa9a;
        --dim: #727565;
        --line: #383b31;
        --line-strong: #565944;
        --amber: #efbd4b;
        --amber-soft: #6e5624;
        --mint: #77d1a5;
        --teal: #54b8c7;
        --red: #de5b50;
        --orange: #e88b3f;
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.025), transparent 34%),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 18px),
          var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        content: "";
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.34), transparent 74%);
      }

      main {
        display: grid;
        min-height: 100vh;
        grid-template-rows: auto 1fr auto;
        gap: 20px;
        padding: 24px;
      }

      header,
      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        min-width: 0;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        color: var(--text);
        font-size: 4.25rem;
        font-weight: 780;
        line-height: 0.96;
      }

      h2 {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 720;
        letter-spacing: 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 18px;
        min-width: 0;
      }

      .brand-mark {
        position: relative;
        display: grid;
        width: 76px;
        height: 76px;
        flex: 0 0 auto;
        place-items: center;
        border: 1px solid var(--line-strong);
        border-radius: 50%;
        background:
          radial-gradient(circle at center, transparent 0 18px, rgba(239, 189, 75, 0.16) 19px 21px, transparent 22px),
          repeating-radial-gradient(circle at center, #2d3028 0 2px, #171a15 2px 5px);
        box-shadow: inset 0 0 0 7px rgba(0, 0, 0, 0.22), var(--shadow);
      }

      .brand-mark::after {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--amber);
        box-shadow: 0 0 18px rgba(239, 189, 75, 0.58);
        content: "";
      }

      .station-line {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 12px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .on-air {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
        padding: 6px 11px;
        border: 1px solid rgba(222, 91, 80, 0.54);
        border-radius: 8px;
        background: rgba(222, 91, 80, 0.14);
        color: #ffd9d3;
        font-size: 0.78rem;
        font-weight: 820;
      }

      .on-air::before {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--red);
        box-shadow: 0 0 18px rgba(222, 91, 80, 0.78);
        content: "";
      }

      body[data-mode="idle"] .on-air {
        border-color: rgba(239, 189, 75, 0.5);
        background: rgba(239, 189, 75, 0.12);
        color: #ffe6ad;
      }

      body[data-mode="idle"] .on-air::before {
        background: var(--amber);
        box-shadow: 0 0 18px rgba(239, 189, 75, 0.54);
      }

      body[data-mode="preview"] .on-air {
        border-color: rgba(84, 184, 199, 0.52);
        background: rgba(84, 184, 199, 0.12);
        color: #d4f7ff;
      }

      body[data-mode="preview"] .on-air::before {
        background: var(--teal);
        box-shadow: 0 0 18px rgba(84, 184, 199, 0.58);
      }

      body[data-mode="playing"] .on-air::before {
        animation: pulse 1.35s ease-in-out infinite;
      }

      .clock {
        min-width: 180px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        text-align: right;
      }

      .clock-time {
        color: var(--text);
        font-size: 1.65rem;
        font-weight: 760;
      }

      .clock-note {
        margin-top: 4px;
        font-size: 0.86rem;
        overflow-wrap: anywhere;
      }

      .broadcast-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(360px, 0.82fr);
        gap: 20px;
        min-height: 0;
      }

      .panel {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(24, 26, 22, 0.96);
        box-shadow: var(--shadow);
      }

      .radio-panel {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 26px;
        padding: 28px;
        overflow: hidden;
      }

      .tuner {
        display: grid;
        gap: 16px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--line);
      }

      .tuner-top {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 18px;
        min-width: 0;
      }

      .frequency {
        color: var(--amber);
        font-family: "SF Pro Rounded", ui-rounded, ui-sans-serif, system-ui, sans-serif;
        font-size: 2.35rem;
        font-weight: 780;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        white-space: nowrap;
      }

      .scale {
        position: relative;
        height: 54px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(119, 209, 165, 0.14), rgba(239, 189, 75, 0.18) 46%, rgba(222, 91, 80, 0.12)),
          repeating-linear-gradient(90deg, transparent 0 32px, rgba(245, 239, 226, 0.42) 33px 34px),
          #12140f;
      }

      .scale::before {
        position: absolute;
        inset: 10px 16px;
        border-top: 1px solid rgba(245, 239, 226, 0.62);
        border-bottom: 1px solid rgba(245, 239, 226, 0.18);
        content: "";
      }

      .needle {
        position: absolute;
        top: 7px;
        bottom: 7px;
        left: 62%;
        width: 3px;
        border-radius: 999px;
        background: var(--red);
        box-shadow: 0 0 16px rgba(222, 91, 80, 0.72);
      }

      .scale-numbers {
        display: flex;
        justify-content: space-between;
        padding: 0 6px;
        color: var(--dim);
        font-size: 0.76rem;
        font-variant-numeric: tabular-nums;
      }

      .now-playing {
        display: grid;
        align-content: center;
        gap: 18px;
        min-height: 300px;
      }

      .section-label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 780;
      }

      .section-label::before {
        width: 24px;
        height: 2px;
        border-radius: 999px;
        background: var(--amber);
        content: "";
      }

      .segment-label {
        color: var(--text);
        font-size: 4.9rem;
        font-weight: 830;
        line-height: 1.02;
        overflow-wrap: anywhere;
      }

      .prompt {
        max-width: 960px;
        color: var(--amber);
        font-size: 1.55rem;
        font-weight: 670;
        line-height: 1.36;
        overflow-wrap: anywhere;
      }

      .rundown {
        display: grid;
        gap: 16px;
      }

      .progress-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .progress-head strong {
        color: var(--text);
        font-weight: 760;
        overflow-wrap: anywhere;
      }

      .progress {
        height: 10px;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        overflow: hidden;
        background: #11130f;
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--mint), var(--amber), var(--orange));
        transition: width 220ms ease;
      }

      .console-panel {
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 0;
        overflow: hidden;
      }

      .console-strip {
        display: grid;
        gap: 18px;
        padding: 24px;
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent),
          var(--surface-strong);
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        min-height: 38px;
        padding: 8px 13px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: #11130f;
        color: var(--text);
        font-weight: 760;
        white-space: nowrap;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--muted);
      }

      .mode-playing .dot,
      .mode-ok .dot {
        background: var(--mint);
        box-shadow: 0 0 14px rgba(119, 209, 165, 0.58);
      }

      .mode-idle .dot {
        background: var(--amber);
        box-shadow: 0 0 14px rgba(239, 189, 75, 0.46);
      }

      .mode-preview .dot {
        background: var(--teal);
        box-shadow: 0 0 14px rgba(84, 184, 199, 0.58);
      }

      .mode-error .dot {
        background: var(--red);
        box-shadow: 0 0 14px rgba(222, 91, 80, 0.58);
      }

      .vu {
        display: grid;
        grid-template-columns: repeat(14, minmax(0, 1fr));
        align-items: end;
        height: 84px;
        gap: 5px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          repeating-linear-gradient(0deg, rgba(245, 239, 226, 0.08) 0 1px, transparent 1px 14px),
          #12140f;
      }

      .vu-bar {
        min-height: 10px;
        border-radius: 999px 999px 3px 3px;
        background: linear-gradient(180deg, var(--red), var(--amber) 40%, var(--mint));
        opacity: 0.35;
        transform-origin: bottom;
        animation: meter 1.05s ease-in-out infinite;
        animation-play-state: paused;
      }

      body[data-mode="playing"] .vu-bar,
      body[data-mode="preview"] .vu-bar {
        opacity: 0.9;
        animation-play-state: running;
      }

      .vu-bar:nth-child(1) { height: 28%; animation-delay: -0.1s; }
      .vu-bar:nth-child(2) { height: 54%; animation-delay: -0.7s; }
      .vu-bar:nth-child(3) { height: 36%; animation-delay: -0.35s; }
      .vu-bar:nth-child(4) { height: 70%; animation-delay: -0.9s; }
      .vu-bar:nth-child(5) { height: 44%; animation-delay: -0.22s; }
      .vu-bar:nth-child(6) { height: 82%; animation-delay: -0.6s; }
      .vu-bar:nth-child(7) { height: 58%; animation-delay: -0.42s; }
      .vu-bar:nth-child(8) { height: 74%; animation-delay: -0.8s; }
      .vu-bar:nth-child(9) { height: 48%; animation-delay: -0.28s; }
      .vu-bar:nth-child(10) { height: 66%; animation-delay: -0.5s; }
      .vu-bar:nth-child(11) { height: 38%; animation-delay: -0.16s; }
      .vu-bar:nth-child(12) { height: 78%; animation-delay: -0.72s; }
      .vu-bar:nth-child(13) { height: 52%; animation-delay: -0.34s; }
      .vu-bar:nth-child(14) { height: 30%; animation-delay: -0.94s; }

      .meters {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        border-bottom: 1px solid var(--line);
      }

      .meter {
        min-width: 0;
        padding: 20px 24px;
        border-right: 1px solid var(--line);
        background: var(--surface);
      }

      .meter:nth-child(2n) {
        border-right: 0;
      }

      .meter strong {
        display: block;
        margin-top: 9px;
        color: var(--text);
        font-size: 1.18rem;
        font-weight: 760;
        line-height: 1.24;
        overflow-wrap: anywhere;
      }

      .evidence {
        min-height: 0;
        padding: 24px;
        overflow: auto;
        background: var(--surface);
      }

      .rows {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .row {
        display: grid;
        grid-template-columns: 98px minmax(0, 1fr);
        gap: 14px;
        align-items: baseline;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--line);
      }

      .row:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .key {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .value {
        min-width: 0;
        color: var(--text);
        overflow-wrap: anywhere;
        font-variant-numeric: tabular-nums;
      }

      .value.path {
        color: #d8d2c5;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.78rem;
        line-height: 1.5;
      }

      .footer-note {
        min-width: 0;
        color: var(--muted);
        font-size: 0.82rem;
        overflow-wrap: anywhere;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.72;
          transform: scale(0.88);
        }
        50% {
          opacity: 1;
          transform: scale(1.18);
        }
      }

      @keyframes meter {
        0%,
        100% {
          transform: scaleY(0.55);
        }
        40% {
          transform: scaleY(1);
        }
        70% {
          transform: scaleY(0.72);
        }
      }

      @media (max-width: 1060px) {
        h1 {
          font-size: 3.2rem;
        }

        .broadcast-shell {
          grid-template-columns: 1fr;
        }

        .console-panel {
          grid-template-rows: auto auto auto;
        }

        .evidence {
          overflow: visible;
        }
      }

      @media (max-width: 720px) {
        main {
          gap: 16px;
          padding: 16px;
        }

        header,
        footer,
        .brand,
        .tuner-top,
        .status-row,
        .progress-head {
          align-items: flex-start;
          flex-direction: column;
        }

        h1 {
          font-size: 2.35rem;
        }

        .brand-mark {
          width: 58px;
          height: 58px;
        }

        .clock {
          min-width: 0;
          text-align: left;
        }

        .radio-panel,
        .console-strip,
        .evidence {
          padding: 18px;
        }

        .now-playing {
          min-height: 220px;
        }

        .segment-label {
          font-size: 2.5rem;
        }

        .prompt {
          font-size: 1.14rem;
        }

        .frequency {
          font-size: 1.8rem;
        }

        .meters {
          grid-template-columns: 1fr;
        }

        .meter {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .meter:last-child {
          border-bottom: 0;
        }

        .row {
          grid-template-columns: 1fr;
          gap: 4px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body data-mode="idle">
    <main>
      <header>
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <div class="station-line">
              <span class="on-air" id="onAirLabel">STANDBY</span>
              <span>剪鸭村融媒体 · 本地播出</span>

        </div>
        <div class="clock">

          <div class="clock-note" id="updated">等待状态</div>

      <section class="broadcast-shell" aria-live="polite">

          <div class="rundown">

              <span class="vu-bar"></span>

              <span class="vu-bar"></span>
              <span class="vu-bar"></span>

          <section class="meters">

            <div class="meter">
              <h2>播放队列</h2>

              <strong id="process">--</strong>
            </div>
            <div class="meter">
              <h2>素材来源</h2>
              <strong id="requestedSource">--</strong>

          <section class="evidence">

            <div class="rows">
              <div class="row">
                <span class="key">当前音频</span>

              <div class="row">

                <span class="value" id="error">--</span>

      <footer>
        <span class="footer-note" id="statusPath">/Users/detroxryo/.cache/banong-radio/status.json</span>
        <span class="footer-note" id="pollState">每 1 秒刷新</span>
      </footer>
    </main>

    <script>
      const STATUS_PATH_FALLBACK = "/Users/detroxryo/.cache/banong-radio/status.json";
      const IS_FILE_PREVIEW = window.location.protocol === "file:";
      const PREVIEW_STATUS = {

      const fields = {
        currentSegment: document.getElementById("currentSegment"),
        nextSegment: document.getElementById("nextSegment"),
        musicPrompt: document.getElementById("musicPrompt"),
        mode: document.getElementById("mode"),
        modePill: document.getElementById("modePill"),
        source: document.getElementById("source"),
        playlist: document.getElementById("playlist"),
        playlistProgress: document.getElementById("playlistProgress"),
        progressLabel: document.getElementById("progressLabel"),
        process: document.getElementById("process"),
        currentPath: document.getElementById("currentPath"),
        ttsPath: document.getElementById("ttsPath"),
        requestedMood: document.getElementById("requestedMood"),
        requestedSource: document.getElementById("requestedSource"),
        cacheKey: document.getElementById("cacheKey"),
        error: document.getElementById("error"),
        statusPath: document.getElementById("statusPath"),
        pollState: document.getElementById("pollState"),
        updated: document.getElementById("updated"),
        clock: document.getElementById("clock"),
        onAirLabel: document.getElementById("onAirLabel"),
      };

      function text(value, fallback = "--") {
        if (value === undefined || value === null || value === "") {
          return fallback;
        }
        return String(value);
      }

      function modeClass(mode) {
        return text(mode, "idle").toLowerCase().replace(/[^a-z0-9_-]/g, "-");
      }

      function onAirLabelForMode(mode) {
        if (mode === "playing") {
          return "ON AIR";
        }
        if (mode === "preview") {
          return "PREVIEW";
        }
        if (mode === "error") {
          return "ERROR";
        }
        return "STANDBY";
      }

      function formatUpdatedAt(value) {
        if (!value) {
          return "等待状态";
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return `更新 ${value}`;
        }
        const formatted = new Intl.DateTimeFormat("zh-CN", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        }).format(date);
        return `更新 ${formatted}`;
      }

      function playlistState(status) {
        const index = Number.isInteger(status.playlist_index) ? status.playlist_index + 1 : null;
        const total = Number.isInteger(status.playlist_total) ? status.playlist_total : null;
        if (index && total) {
          return {
            label: `${index} / ${total}`,
            progressLabel: `第 ${index} / ${total} 段`,
            progress: Math.min(100, Math.max(0, Math.round((index / total) * 100))),
          };
        }
        if (total) {
          return {
            label: `${total} 段`,
            progressLabel: "队列待机",
            progress: 0,
          };
        }
        return {
          label: "--",
          progressLabel: "队列待机",
          progress: 0,
        };
      }

      function render(status) {
        const mode = text(status.mode, "idle");
        const safeMode = modeClass(mode);
        const playlist = playlistState(status);
        const isIdle = safeMode === "idle";

        document.body.dataset.mode = safeMode;
        fields.currentSegment.textContent = text(status.current_segment, isIdle ? "等待启动" : "--");
        fields.nextSegment.textContent = text(status.next_segment);
        fields.musicPrompt.textContent = text(status.music_prompt, isIdle ? "播出链路待机" : "--");
        fields.mode.textContent = mode;
        fields.modePill.className = `status-pill mode-${safeMode}`;
        fields.onAirLabel.textContent = onAirLabelForMode(safeMode);
        fields.source.textContent = text(status.source, isIdle ? "待机" : "--");
        fields.currentPath.textContent = text(status.current_path);
        fields.ttsPath.textContent = text(status.tts_path);
        fields.requestedMood.textContent = text(status.requested_mood);
        fields.requestedSource.textContent = text(status.content_provider || status.content_source || status.requested_source);
        fields.cacheKey.textContent = text(status.cache_key);
        fields.error.textContent = text(status.error || status.asset_error);
        fields.statusPath.textContent = text(status.status_path, STATUS_PATH_FALLBACK);
        fields.updated.textContent = status.preview ? "本地设计预览" : formatUpdatedAt(status.updated_at);
        fields.playlist.textContent = playlist.label;
        fields.progressLabel.textContent = playlist.progressLabel;
        fields.playlistProgress.style.width = `${playlist.progress}%`;

        if (status.preview) {
          fields.process.textContent = "设计预览";
        } else if (status.pid) {
          fields.process.textContent = status.process_alive ? `PID ${status.pid} 活跃` : `PID ${status.pid} 不活跃`;
        } else {
          fields.process.textContent = "无后台播放器";
        }
      }

      async function refresh() {
        try {
          const response = await fetch(`/status.json?t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const status = await response.json();
          render(status);
          fields.pollState.textContent = "每 1 秒刷新";
        } catch (error) {
          fields.pollState.textContent = `读取失败：${error.message}`;
          document.body.dataset.mode = "error";
          fields.modePill.className = "status-pill mode-error";
          fields.mode.textContent = "error";
          fields.onAirLabel.textContent = "ERROR";
          fields.updated.textContent = "状态读取失败";
        }
      }

      function tickClock() {
        fields.clock.textContent = new Intl.DateTimeFormat("zh-CN", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        }).format(new Date());
      }

      tickClock();
      setInterval(tickClock, 1000);
      if (IS_FILE_PREVIEW) {
        render(PREVIEW_STATUS);
        fields.pollState.textContent = "本地预览";
      } else {
        refresh();
        setInterval(refresh, 1000);
      }
    </script>
  </body>
</html>
