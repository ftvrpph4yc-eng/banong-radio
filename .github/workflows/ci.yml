name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system audio tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Prepare local runtime directories
        run: |
          sudo mkdir -p /Users/detroxryo/Music/BanongRadio
          sudo mkdir -p /Users/detroxryo/.cache/banong-radio
          sudo chown -R "$USER:$USER" /Users/detroxryo

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Compile sources
        run: python -m compileall -q src tests

      - name: Run tests
        run: PYTHONPATH=src python -m pytest
